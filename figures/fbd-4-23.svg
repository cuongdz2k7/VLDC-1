<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="620" viewBox="0 0 1100 620" role="img" aria-labelledby="title desc">
  <title id="title">Free body diagram for problem 4.23</title>
  <desc id="desc">Free body diagrams for boxes A, B, and the combined system A plus B on a frictionless horizontal surface.</desc>
  <defs>
    <marker id="arrow-red" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#d33f49"/>
    </marker>
    <marker id="arrow-blue" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 14 7 L 0 14 z" fill="#15803d"/>
    </marker>
    <marker id="arrow-gray" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 12 6 L 0 12 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .panel { fill: #ffffff; stroke: #d9d4ca; stroke-width: 2; rx: 16; }
      .ground { stroke: #78716c; stroke-width: 5; stroke-linecap: round; }
      .block-a { fill: #f6b35d; stroke: #7c3f12; stroke-width: 3; }
      .block-b { fill: #f7d28b; stroke: #7c3f12; stroke-width: 3; }
      .system { fill: #fed7aa; stroke: #7c3f12; stroke-width: 3; }
      .title { font: 700 28px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 16px Arial, sans-serif; fill: #4b5563; }
      .label { font: 700 22px Arial, sans-serif; fill: #111827; }
      .force-red { stroke: #d33f49; stroke-width: 6; stroke-linecap: round; marker-end: url(#arrow-red); }
      .force-blue { stroke: #2563eb; stroke-width: 6; stroke-linecap: round; marker-end: url(#arrow-blue); }
      .force-green { stroke: #15803d; stroke-width: 6; stroke-linecap: round; marker-end: url(#arrow-green); }
      .axis { stroke: #374151; stroke-width: 3; stroke-linecap: round; marker-end: url(#arrow-gray); }
      .axis-label { font: 600 18px Arial, sans-serif; fill: #374151; }
      .note { font: 500 15px Arial, sans-serif; fill: #6b7280; }
      .math { font: italic 700 22px Georgia, serif; fill: #111827; }
      .small-math { font: italic 700 18px Georgia, serif; fill: #111827; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1100" height="620"/>
  <text class="title" x="40" y="52">Bài 4.23 - Free Body Diagram</text>
  <text class="subtitle" x="40" y="80">Mặt ngang không ma sát: lực đứng cân bằng, lực ngang quyết định gia tốc.</text>

  <line class="axis" x1="950" y1="78" x2="1030" y2="78"/>
  <line class="axis" x1="950" y1="78" x2="950" y2="18"/>
  <text class="axis-label" x="1038" y="84">x</text>
  <text class="axis-label" x="944" y="16">y</text>

  <rect class="panel" x="40" y="115" width="315" height="430"/>
  <text class="label" x="68" y="150">Xét riêng A</text>
  <line class="ground" x1="95" y1="355" x2="300" y2="355"/>
  <rect class="block-a" x="150" y="245" width="100" height="110" rx="4"/>
  <text class="label" x="190" y="310">A</text>
  <line class="force-green" x1="70" y1="300" x2="142" y2="300"/>
  <text class="math" x="58" y="286">F</text>
  <text class="small-math" x="52" y="325">250 N</text>
  <line class="force-red" x1="310" y1="300" x2="258" y2="300"/>
  <text class="math" x="282" y="286">F<tspan baseline-shift="sub" font-size="14">BA</tspan></text>
  <line class="force-blue" x1="200" y1="235" x2="200" y2="170"/>
  <text class="math" x="214" y="190">N<tspan baseline-shift="sub" font-size="14">A</tspan></text>
  <line class="force-red" x1="200" y1="365" x2="200" y2="435"/>
  <text class="math" x="213" y="420">m<tspan baseline-shift="sub" font-size="14">A</tspan>g</text>
  <text class="note" x="70" y="500">Theo phương ngang: F - F<tspan baseline-shift="sub" font-size="11">BA</tspan> = m<tspan baseline-shift="sub" font-size="11">A</tspan>a</text>

  <rect class="panel" x="392" y="115" width="315" height="430"/>
  <text class="label" x="420" y="150">Xét riêng B</text>
  <line class="ground" x1="447" y1="355" x2="652" y2="355"/>
  <rect class="block-b" x="505" y="275" width="90" height="80" rx="4"/>
  <text class="label" x="540" y="325">B</text>
  <line class="force-green" x1="420" y1="315" x2="497" y2="315"/>
  <text class="math" x="412" y="302">F<tspan baseline-shift="sub" font-size="14">AB</tspan></text>
  <line class="force-blue" x1="550" y1="265" x2="550" y2="195"/>
  <text class="math" x="564" y="215">N<tspan baseline-shift="sub" font-size="14">B</tspan></text>
  <line class="force-red" x1="550" y1="365" x2="550" y2="435"/>
  <text class="math" x="563" y="420">m<tspan baseline-shift="sub" font-size="14">B</tspan>g</text>
  <text class="note" x="420" y="500">Theo phương ngang: F<tspan baseline-shift="sub" font-size="11">AB</tspan> = m<tspan baseline-shift="sub" font-size="11">B</tspan>a</text>

  <rect class="panel" x="744" y="115" width="315" height="430"/>
  <text class="label" x="772" y="150">Xét cả hệ A+B</text>
  <line class="ground" x1="795" y1="355" x2="1010" y2="355"/>
  <rect class="system" x="845" y="250" width="145" height="105" rx="4"/>
  <line x1="930" y1="250" x2="930" y2="355" stroke="#7c3f12" stroke-width="2" stroke-dasharray="8 8"/>
  <text class="label" x="875" y="313">A</text>
  <text class="label" x="955" y="313">B</text>
  <line class="force-green" x1="770" y1="302" x2="837" y2="302"/>
  <text class="math" x="760" y="289">F</text>
  <line class="force-blue" x1="918" y1="240" x2="918" y2="175"/>
  <text class="math" x="934" y="195">N<tspan baseline-shift="sub" font-size="14">A</tspan> + N<tspan baseline-shift="sub" font-size="14">B</tspan></text>
  <line class="force-red" x1="918" y1="365" x2="918" y2="435"/>
  <text class="math" x="934" y="420">(m<tspan baseline-shift="sub" font-size="14">A</tspan> + m<tspan baseline-shift="sub" font-size="14">B</tspan>)g</text>
  <text class="note" x="772" y="500">Nội lực F<tspan baseline-shift="sub" font-size="11">AB</tspan>, F<tspan baseline-shift="sub" font-size="11">BA</tspan> không xuất hiện.</text>
</svg>
