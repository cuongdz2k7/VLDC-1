<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="720" viewBox="0 0 1100 720" role="img" aria-labelledby="title desc">
  <title id="title">Bài 5.8 - FBD xe trên mặt phẳng nghiêng</title>
  <desc id="desc">Free body diagram for a car held by a cable on a frictionless incline.</desc>
  <defs>
    
    <marker id="arrow-red" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#dc2626"/>
    </marker>
    
    <marker id="arrow-blue" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#2563eb"/>
    </marker>
    
    <marker id="arrow-green" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#15803d"/>
    </marker>
    
    <marker id="arrow-purple" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#7c3aed"/>
    </marker>
    
    <marker id="arrow-gray" markerWidth="6" markerHeight="6" refX="5.3" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 6 3 L 0 6 z" fill="#374151"/>
    </marker>
    <style>
      .bg { fill: #fbfaf7; }
      .card { fill: #fff; stroke: #ddd6ce; stroke-width: 2; rx: 18; }
      .title { font: 700 30px Arial, sans-serif; fill: #111827; }
      .subtitle { font: 500 17px Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 19px Arial, sans-serif; fill: #374151; }
      .force-label { font: italic 700 17px Georgia, serif; fill: #111827; }
      .small { font: 500 16px Arial, sans-serif; fill: #6b7280; }
      .slope { stroke: #8b7d70; stroke-width: 6; stroke-linecap: round; }
      .slope-fill { fill: #e7e5e4; stroke: none; }
      .dash { stroke: #78716c; stroke-width: 2.5; stroke-dasharray: 9 8; fill: none; }
      .body { fill: #f59e42; stroke: #7c2d12; stroke-width: 4; }
      .window { fill: #dbeafe; stroke: #7c2d12; stroke-width: 3; }
      .wheel { fill: #1f2937; stroke: #111827; stroke-width: 3; }
      .wheel-inner { fill: #9ca3af; }
      .force-red { stroke: #dc2626; stroke-width: 2.6; stroke-linecap: round; }
      .force-blue { stroke: #2563eb; stroke-width: 2.6; stroke-linecap: round; }
      .force-green { stroke: #15803d; stroke-width: 2.6; stroke-linecap: round; }
      .force-purple { stroke: #7c3aed; stroke-width: 2.6; stroke-linecap: round; }
      .axis { stroke: #374151; stroke-width: 1.9; stroke-linecap: round; }
      .component { stroke: #9ca3af; stroke-width: 1.5; stroke-dasharray: 6 6; }
      .angle { fill: none; stroke: #374151; stroke-width: 2.5; }
    </style>
  </defs>

  <rect class="bg" width="1100" height="720"/>
  <rect class="card" x="34" y="30" width="1032" height="660"/>

  <text class="title" x="64" y="78">Bài 5.8 - FBD xe trên mặt phẳng nghiêng</text>
  <text class="subtitle" x="64" y="108">Cáp tạo góc 31° so với mặt dốc; mặt phẳng rất trơn nên không có ma sát.</text>

  <polygon class="slope-fill" points="135.0,565.0 887.2,214.2 887.2,565.0"/>
  <line class="slope" x1="135" y1="565" x2="887.2354632404194" y2="214.22684275521948"/>
  <path class="angle" d="M 213 565 A 78 78 0 0 0 205.7 532.0"/>
  <text class="label" x="230.0" y="540.0">25°</text>

  <line class="dash" x1="505.0" y1="465.0" x2="740.6" y2="355.1"/>
  <line class="dash" x1="535" y1="375" x2="663.6" y2="184.3"/>
  <path class="angle" d="M 643.8 324.3 A 120 120 0 0 0 602.1 275.5"/>
  <text class="label" x="634.0" y="293.9">31°</text>

  <g transform="translate(535 375) rotate(-25)">
    <rect class="body" x="-95.0" y="-41.0" width="190" height="82" rx="15"/>
    <path class="window" d="M -52 -42 L 6 -42 L 36 -8 L -75 -8 Z"/>
    <circle class="wheel" cx="-60" cy="43" r="24"/>
    <circle class="wheel-inner" cx="-60" cy="43" r="9"/>
    <circle class="wheel" cx="68" cy="43" r="24"/>
    <circle class="wheel-inner" cx="68" cy="43" r="9"/>
  </g>

  <line class="force-green" x1="535.0" y1="375.0" x2="616.1" y2="254.8" marker-end="url(#arrow-green)"/>
<text class="force-label" x="610.1" y="245.9">T</text>
  <line class="force-blue" x1="535.0" y1="375.0" x2="492.7" y2="284.4" marker-end="url(#arrow-blue)"/>
<text class="force-label" x="469.1" y="274.1">N</text>
  <line class="force-red" x1="535.0" y1="375.0" x2="535.0" y2="500.0" marker-end="url(#arrow-red)"/>
<text class="force-label" x="519.0" y="516.0">mg</text>
  <line class="axis" x1="535.0" y1="375.0" x2="648.3" y2="322.2" marker-end="url(#arrow-gray)"/>
<text class="force-label" x="639.5" y="324.8">x</text>
  <line class="axis" x1="535.0" y1="375.0" x2="499.1" y2="298.0" marker-end="url(#arrow-gray)"/>
<text class="force-label" x="479.7" y="296.7">y</text>

  <line class="component" x1="535" y1="375" x2="417.2" y2="429.9"/>
  <text class="small" x="347.2" y="459.9">mg sinθ</text>
  <line class="component" x1="535" y1="375" x2="583.6" y2="479.2"/>
  <text class="small" x="505.6" y="485.2">mg cosθ</text>

  <text class="small" x="64" y="628">FBD: các lực tác dụng lên xe gồm trọng lực mg, pháp tuyến N, lực căng T. Không có ma sát.</text>
  <text class="small" x="64" y="658">Trục x chọn dọc mặt phẳng nghiêng; trục y vuông góc mặt phẳng nghiêng.</text>
</svg>
