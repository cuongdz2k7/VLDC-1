<svg xmlns="http://www.w3.org/2000/svg" width="980" height="460" viewBox="0 0 980 460">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .paper { fill: #fffdf7; }
      .line { stroke: #1f2937; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #1f2937; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .force { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .move { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .dot { fill: #f97316; stroke: #7c2d12; stroke-width: 2; }
      .txt { font: 22px "Comic Sans MS", "Segoe Print", Arial, sans-serif; fill: #111827; }
      .small { font: 18px "Comic Sans MS", "Segoe Print", Arial, sans-serif; fill: #111827; }
      .blue { fill: #1d4ed8; }
    </style>
  </defs>

  <rect width="980" height="460" class="paper"/>

  <g opacity="0.2">
    <line x1="0" y1="60" x2="980" y2="60" stroke="#64748b"/>
    <line x1="0" y1="110" x2="980" y2="110" stroke="#64748b"/>
    <line x1="0" y1="160" x2="980" y2="160" stroke="#64748b"/>
    <line x1="0" y1="210" x2="980" y2="210" stroke="#64748b"/>
    <line x1="0" y1="260" x2="980" y2="260" stroke="#64748b"/>
    <line x1="0" y1="310" x2="980" y2="310" stroke="#64748b"/>
    <line x1="0" y1="360" x2="980" y2="360" stroke="#64748b"/>
    <line x1="0" y1="410" x2="980" y2="410" stroke="#64748b"/>
  </g>

  <text x="36" y="42" class="txt">Bài 6.24: ném thẳng đứng lên - dùng định lý công động năng</text>

  <!-- ground and vertical axis -->
  <line x1="90" y1="390" x2="890" y2="390" class="line"/>
  <text x="94" y="420" class="small">mặt đất, chọn U = 0</text>
  <line x1="150" y1="390" x2="150" y2="78" class="move"/>
  <text x="164" y="92" class="txt blue">+y</text>
  <text x="178" y="124" class="small blue">chiều dương = chiều chuyển động ban đầu</text>

  <!-- state 0 -->
  <circle cx="330" cy="390" r="13" class="dot"/>
  <text x="285" y="372" class="small">0: vừa rời tay</text>
  <text x="285" y="422" class="small">h0 = 0, v0 = ?</text>
  <line x1="330" y1="374" x2="330" y2="310" class="move"/>
  <text x="345" y="334" class="small blue">v0 lên</text>

  <!-- state 1 at 15m -->
  <circle cx="520" cy="240" r="13" class="dot"/>
  <text x="548" y="232" class="small">1: h = 15,0 m</text>
  <text x="548" y="258" class="small">v = 25,0 m/s lên</text>
  <line x1="520" y1="224" x2="520" y2="162" class="move"/>
  <text x="535" y="184" class="small blue">v lên</text>
  <line x1="520" y1="255" x2="520" y2="323" class="force"/>
  <text x="535" y="303" class="small">P = 3 N</text>

  <!-- top -->
  <circle cx="710" cy="120" r="13" class="dot"/>
  <text x="735" y="112" class="small">2: cao nhất</text>
  <text x="735" y="138" class="small">v = 0, hmax = ?</text>
  <line x1="710" y1="135" x2="710" y2="203" class="force"/>
  <text x="725" y="183" class="small">P</text>

  <!-- height brackets -->
  <line x1="475" y1="390" x2="475" y2="240" class="thin"/>
  <line x1="463" y1="390" x2="487" y2="390" class="thin"/>
  <line x1="463" y1="240" x2="487" y2="240" class="thin"/>
  <text x="405" y="320" class="small">15,0 m</text>

  <path d="M340 365 C410 285, 540 180, 700 120" class="thin" stroke-dasharray="8 6"/>
  <text x="360" y="95" class="small">Sau khi rời tay: chỉ có trọng lực sinh công âm khi vật đi lên</text>
  <text x="340" y="445" class="small">Dùng A_g = -P Δh và A_net = ΔK; không cần tìm thời gian.</text>
</svg>
