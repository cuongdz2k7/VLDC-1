<svg xmlns="http://www.w3.org/2000/svg" width="980" height="430" viewBox="0 0 980 430">
  <defs>
    <marker id="arrow" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .paper { fill: #fffdf7; }
      .line { stroke: #1f2937; stroke-width: 3; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .thin { stroke: #1f2937; stroke-width: 2; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .force { stroke: #1f2937; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .move { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .axis { stroke: #2563eb; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .txt { font: 22px "Comic Sans MS", "Segoe Print", Arial, sans-serif; fill: #111827; }
      .small { font: 18px "Comic Sans MS", "Segoe Print", Arial, sans-serif; fill: #111827; }
      .blue { fill: #1d4ed8; }
    </style>
  </defs>

  <rect width="980" height="430" class="paper"/>

  <!-- notebook-ish ruled lines -->
  <g opacity="0.2">
    <line x1="0" y1="58" x2="980" y2="58" stroke="#64748b"/>
    <line x1="0" y1="108" x2="980" y2="108" stroke="#64748b"/>
    <line x1="0" y1="158" x2="980" y2="158" stroke="#64748b"/>
    <line x1="0" y1="208" x2="980" y2="208" stroke="#64748b"/>
    <line x1="0" y1="258" x2="980" y2="258" stroke="#64748b"/>
    <line x1="0" y1="308" x2="980" y2="308" stroke="#64748b"/>
    <line x1="0" y1="358" x2="980" y2="358" stroke="#64748b"/>
  </g>

  <text x="36" y="42" class="txt">(a) Chọn chiều dương = chiều chuyển động</text>

  <!-- table -->
  <line x1="72" y1="214" x2="610" y2="214" class="line"/>
  <g class="thin">
    <line x1="85" y1="222" x2="72" y2="236"/>
    <line x1="130" y1="222" x2="117" y2="236"/>
    <line x1="175" y1="222" x2="162" y2="236"/>
    <line x1="220" y1="222" x2="207" y2="236"/>
    <line x1="265" y1="222" x2="252" y2="236"/>
    <line x1="310" y1="222" x2="297" y2="236"/>
    <line x1="355" y1="222" x2="342" y2="236"/>
    <line x1="400" y1="222" x2="387" y2="236"/>
    <line x1="445" y1="222" x2="432" y2="236"/>
    <line x1="490" y1="222" x2="477" y2="236"/>
    <line x1="535" y1="222" x2="522" y2="236"/>
    <line x1="580" y1="222" x2="567" y2="236"/>
  </g>

  <!-- 20 N block -->
  <rect x="150" y="124" width="108" height="90" class="line"/>
  <text x="184" y="166" class="txt">20</text>
  <text x="192" y="194" class="small">N</text>

  <!-- horizontal string and pulley -->
  <line x1="258" y1="150" x2="545" y2="150" class="line"/>
  <circle cx="585" cy="150" r="32" class="line"/>
  <circle cx="585" cy="150" r="6" fill="#1f2937"/>
  <line x1="617" y1="150" x2="617" y2="250" class="line"/>

  <!-- 12 N block -->
  <rect x="562" y="250" width="105" height="80" class="line"/>
  <text x="598" y="286" class="txt">12</text>
  <text x="606" y="314" class="small">N</text>

  <!-- movement arrows -->
  <line x1="300" y1="182" x2="420" y2="182" class="move"/>
  <text x="330" y="208" class="small blue">s sang phải</text>
  <line x1="690" y1="246" x2="690" y2="330" class="move"/>
  <text x="706" y="295" class="small blue">s xuống</text>

  <!-- forces on 20 N block -->
  <line x1="258" y1="150" x2="333" y2="150" class="force"/>
  <text x="292" y="137" class="txt">T</text>
  <line x1="150" y1="184" x2="96" y2="184" class="force"/>
  <text x="104" y="171" class="txt">f</text>
  <line x1="204" y1="124" x2="204" y2="72" class="force"/>
  <text x="216" y="88" class="txt">N</text>
  <line x1="204" y1="214" x2="204" y2="270" class="force"/>
  <text x="218" y="258" class="txt">P20</text>

  <!-- forces on 12 N block -->
  <line x1="617" y1="250" x2="617" y2="198" class="force"/>
  <text x="630" y="218" class="txt">T</text>
  <line x1="617" y1="330" x2="617" y2="386" class="force"/>
  <text x="632" y="374" class="txt">P12</text>

  <!-- local axes -->
  <line x1="785" y1="190" x2="885" y2="190" class="axis"/>
  <line x1="785" y1="190" x2="785" y2="95" class="axis"/>
  <line x1="785" y1="190" x2="785" y2="285" class="axis"/>
  <text x="895" y="197" class="txt blue">x+</text>
  <text x="794" y="103" class="txt blue">y-</text>
  <text x="794" y="284" class="txt blue">y+</text>

  <text x="340" y="360" class="small">v không đổi nên a = 0, tổng công trên mỗi khối bằng 0</text>
</svg>
