<svg xmlns="http://www.w3.org/2000/svg" width="960" height="520" viewBox="0 0 960 520">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f2937"/>
    </marker>
    <style>
      .title { font: 700 24px Arial, sans-serif; fill: #111827; }
      .label { font: 18px Arial, sans-serif; fill: #111827; }
      .small { font: 15px Arial, sans-serif; fill: #374151; }
      .axis { stroke: #2563eb; stroke-width: 3; marker-end: url(#arrow); }
      .force { stroke: #dc2626; stroke-width: 4; marker-end: url(#arrow); }
      .move { stroke: #16a34a; stroke-width: 4; marker-end: url(#arrow); stroke-dasharray: 8 6; }
      .block { fill: #fbbf24; stroke: #92400e; stroke-width: 3; rx: 6; }
      .surface { fill: #e5e7eb; stroke: #9ca3af; stroke-width: 2; }
      .string { stroke: #6b7280; stroke-width: 4; fill: none; }
      .pulley { fill: #d1d5db; stroke: #4b5563; stroke-width: 3; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; rx: 10; }
    </style>
  </defs>

  <rect width="960" height="520" fill="#f9fafb"/>
  <text x="480" y="42" text-anchor="middle" class="title">FBD bài 6.7: xét riêng từng khối</text>

  <rect x="40" y="76" width="420" height="382" class="panel"/>
  <text x="250" y="112" text-anchor="middle" class="label">Khối 20,0 N trên mặt bàn</text>
  <text x="250" y="138" text-anchor="middle" class="small">Chuyển dời sang phải, chọn +x sang phải</text>

  <rect x="80" y="310" width="340" height="30" class="surface"/>
  <rect x="190" y="220" width="120" height="90" class="block"/>
  <text x="250" y="272" text-anchor="middle" class="label">20,0 N</text>

  <line x1="310" y1="252" x2="390" y2="252" class="string"/>
  <circle cx="410" cy="252" r="24" class="pulley"/>
  <circle cx="410" cy="252" r="6" fill="#4b5563"/>

  <line x1="250" y1="220" x2="250" y2="160" class="force"/>
  <text x="264" y="166" class="label">N</text>

  <line x1="250" y1="310" x2="250" y2="378" class="force"/>
  <text x="266" y="372" class="label">P20</text>

  <line x1="310" y1="265" x2="380" y2="265" class="force"/>
  <text x="344" y="249" class="label">T</text>

  <line x1="190" y1="265" x2="120" y2="265" class="force"/>
  <text x="132" y="249" class="label">f</text>

  <line x1="190" y1="355" x2="310" y2="355" class="axis"/>
  <text x="318" y="361" class="small">+x</text>

  <line x1="190" y1="405" x2="310" y2="405" class="move"/>
  <text x="244" y="431" text-anchor="middle" class="small">s = 0,750 m</text>
  <text x="250" y="184" text-anchor="middle" class="small">a = 0 vì tốc độ không đổi</text>

  <rect x="500" y="76" width="420" height="382" class="panel"/>
  <text x="710" y="112" text-anchor="middle" class="label">Khối 12,0 N treo</text>
  <text x="710" y="138" text-anchor="middle" class="small">Chuyển dời xuống, chọn +y xuống</text>

  <line x1="710" y1="160" x2="710" y2="220" class="string"/>
  <rect x="650" y="220" width="120" height="90" class="block"/>
  <text x="710" y="272" text-anchor="middle" class="label">12,0 N</text>

  <line x1="710" y1="220" x2="710" y2="164" class="force"/>
  <text x="724" y="174" class="label">T</text>

  <line x1="710" y1="310" x2="710" y2="380" class="force"/>
  <text x="724" y="374" class="label">P12</text>

  <line x1="805" y1="220" x2="805" y2="340" class="axis"/>
  <text x="818" y="343" class="small">+y</text>

  <line x1="615" y1="220" x2="615" y2="340" class="move"/>
  <text x="570" y="286" class="small" transform="rotate(-90 570 286)">s = 0,750 m</text>
  <text x="710" y="405" text-anchor="middle" class="small">a = 0 vì tốc độ không đổi</text>

  <text x="480" y="490" text-anchor="middle" class="small">Quy tắc đọc công: lực cùng chiều chuyển dời sinh công dương, ngược chiều âm, vuông góc bằng 0.</text>
</svg>
